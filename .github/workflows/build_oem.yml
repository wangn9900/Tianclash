name: Build OEM Client

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'App Name (应用名称)'
        required: true
        default: '展示'
      binaryName:
        description: 'Binary Name (可执行文件名, 英文/拼音)'
        required: true
        default: 'ZhanShi'
      packageName:
        description: 'Package Name (包名)'
        required: true
        default: 'com.follow.clash'
      ossUrl:
        description: 'OSS URL (配置接口)'
        required: true
        default: 'https://oss.tianque.cc/osss_config.txt'
      imgbbApiKey:
        description: 'ImgBB API Key (图床Key)'
        required: true
        default: '85719aefcab7c40a7eaed3b06784898a'
      backupUrls:
        description: 'Backup URLs (备用地址, 逗号分隔)'
        required: false
        default: 'https://210.16.123.247,https://210.16.123.247,https://210.16.123.247'
      fallbackUrl:
        description: 'Fallback URL (回退地址)'
        required: false
        default: 'https://150.241.207.176:8443'
      iconUrl:
        description: 'Icon URL (图标链接, 可选)'
        required: false
        default: 'https://oss.tianque.cc/i8.png'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Update OEM Config
        run: |
          dart run scripts/update_oem.dart \
            --appName="${{ github.event.inputs.appName }}" \
            --binaryName="${{ github.event.inputs.binaryName }}" \
            --packageName="${{ github.event.inputs.packageName }}" \
            --ossUrl="${{ github.event.inputs.ossUrl }}" \
            --imgbbApiKey="${{ github.event.inputs.imgbbApiKey }}" \
            --backupUrls="${{ github.event.inputs.backupUrls }}" \
            --fallbackUrl="${{ github.event.inputs.fallbackUrl }}" \
            --iconPath="${{ github.event.inputs.iconUrl != '' && github.event.inputs.iconUrl || 'assets/images/icon.png' }}"
            
      - name: Build Core
        run: dart setup.dart android --out core

      - name: Setup Android Signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          elif [ -n "${{ secrets.KEYSTORE }}" ]; then
            echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          else
            echo "⚠️ No keystore secret found!"
          fi
          
          if [ -n "${{ secrets.KEY_ALIAS }}" ]; then
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          fi
          if [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ]; then
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/local.properties
          elif [ -n "${{ secrets.STORE_PASSWORD }}" ]; then
            echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          fi
          if [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties
          fi

      - name: Build APK
        run: flutter build apk --release --split-per-abi --dart-define=APP_ENV=stable
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-Android
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk

  build-windows:
    name: Build Windows Client
    runs-on: Windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Update OEM Config
        run: |
          dart run scripts/update_oem.dart `
            --appName="${{ github.event.inputs.appName }}" `
            --binaryName="${{ github.event.inputs.binaryName }}" `
            --packageName="${{ github.event.inputs.packageName }}" `
            --ossUrl="${{ github.event.inputs.ossUrl }}" `
            --imgbbApiKey="${{ github.event.inputs.imgbbApiKey }}" `
            --backupUrls="${{ github.event.inputs.backupUrls }}" `
            --fallbackUrl="${{ github.event.inputs.fallbackUrl }}" `
            --iconPath="${{ github.event.inputs.iconUrl != '' && github.event.inputs.iconUrl || 'assets/images/icon.png' }}"
            
      - name: Prepare Build Environment
        run: |
          # 注意：不执行 flutter clean，因为这可能导致构建问题
          # 只确保依赖是最新的
          flutter pub get
          
          # 验证 OEM 配置更新成功
          Write-Host "=== Verifying OEM Config Changes ==="
          if (Test-Path "windows/runner/Runner.rc") {
            Get-Content "windows/runner/Runner.rc" | Select-String -Pattern "FileDescription|ProductName" | ForEach-Object { Write-Host $_ }
          }

            
      - name: Build Windows (using same method as main build)
        run: |
          # 使用与主构建相同的方式
          dart setup.dart windows --arch amd64 --env stable
          
      - name: Verify Build Output
        run: |
          Write-Host "=== Checking build output ==="
          
          # 检查 dist 目录
          if (Test-Path "dist") {
            Write-Host "dist directory exists:"
            Get-ChildItem -Path "dist" -Recurse | ForEach-Object {
              Write-Host "  $($_.FullName) - $($_.Length) bytes"
            }
          } else {
            Write-Host "ERROR: dist directory does not exist!"
          }
          
          # 检查原始 Flutter 构建产物
          $releasePath = "build/windows/x64/runner/Release"
          if (Test-Path $releasePath) {
            Write-Host "`n=== Flutter Release build output ==="
            Get-ChildItem -Path $releasePath -Recurse | ForEach-Object {
              Write-Host "  $($_.FullName) - $($_.Length) bytes"
            }
            
            # 检查主 exe 大小
            $mainExe = Get-ChildItem -Path $releasePath -Filter "*.exe" | Where-Object { $_.Name -notlike "*Helper*" -and $_.Name -notlike "*Core*" } | Select-Object -First 1
            if ($mainExe) {
              Write-Host "`nMain EXE: $($mainExe.Name) = $($mainExe.Length) bytes"
              if ($mainExe.Length -lt 1000000) {
                Write-Host "WARNING: EXE is suspiciously small! Expected > 1MB"
              }
            }
          } else {
            Write-Host "WARNING: Release path not found: $releasePath"
          }
          
          # 检查 libclash 目录
          if (Test-Path "libclash/windows") {
            Write-Host "`n=== libclash/windows contents ==="
            Get-ChildItem -Path "libclash/windows" -Recurse | ForEach-Object {
              Write-Host "  $($_.FullName) - $($_.Length) bytes"
            }
          }

          
      - name: Prepare Final Package
        run: |
          # 找到构建产物
          $distDir = "dist"
          Write-Host "=== Dist directory contents ==="
          Get-ChildItem $distDir -Recurse | Format-Table FullName, Length
          
          # 找到 zip 文件
          $zipFile = Get-ChildItem $distDir -Filter "*.zip" | Select-Object -First 1
          if ($zipFile) {
            Write-Host "Found zip: $($zipFile.FullName)"
            
            # 解压到临时目录
            $tempDir = "temp_extract"
            if (Test-Path $tempDir) {
              Remove-Item -Path $tempDir -Recurse -Force
            }
            Expand-Archive -Path $zipFile.FullName -DestinationPath $tempDir -Force
            
            Write-Host "=== Extracted contents ==="
            Get-ChildItem $tempDir -Recurse | Format-Table FullName, Length
            
            # 查找所有 exe 文件
            Write-Host "=== Looking for TianQue.exe ==="
            $allExes = Get-ChildItem $tempDir -Filter "*.exe" -Recurse
            foreach ($exe in $allExes) {
              Write-Host "Found exe: $($exe.FullName) (Size: $($exe.Length) bytes)"
            }
            
            # 重命名可执行文件
            $binaryName = "${{ github.event.inputs.binaryName }}"
            if ($binaryName -and $binaryName -ne "") {
              $exeFile = Get-ChildItem $tempDir -Filter "TianQue.exe" -Recurse | Select-Object -First 1
              if ($exeFile) {
                Write-Host "Found TianQue.exe at: $($exeFile.FullName)"
                Write-Host "File size: $($exeFile.Length) bytes"
                $newName = "$binaryName.exe"
                $newPath = Join-Path $exeFile.Directory.FullName $newName
                Move-Item -Path $exeFile.FullName -Destination $newPath -Force
                Write-Host "Renamed TianQue.exe to $newName"
                
                # 验证重命名后的文件
                $renamedFile = Get-Item $newPath
                Write-Host "Renamed file size: $($renamedFile.Length) bytes"
              } else {
                Write-Host "WARNING: TianQue.exe not found in extracted files!"
                # 列出所有可能的主程序
                $exeFiles = Get-ChildItem $tempDir -Filter "*.exe" -Recurse | Where-Object { $_.Name -notlike "*Helper*" -and $_.Name -notlike "*Core*" }
                if ($exeFiles) {
                  Write-Host "Available main exes:"
                  foreach ($ex in $exeFiles) {
                    Write-Host "  $($ex.Name) at $($ex.FullName)"
                  }
                }
              }
            }
            
            # 查找解压后的实际内容目录
            # flutter_distributor 可能会在 zip 内创建子目录
            $contentDir = $tempDir
            $subdirs = Get-ChildItem $tempDir -Directory
            if ($subdirs.Count -eq 1 -and (Get-ChildItem $tempDir -File).Count -eq 0) {
              # 只有一个子目录且没有文件，说明内容在子目录中
              $contentDir = $subdirs[0].FullName
              Write-Host "Content is in subdirectory: $contentDir"
            }
            
            # 重新打包 - 使用内容目录
            $finalZip = "${{ github.event.inputs.appName }}-Windows.zip"
            if (Test-Path $finalZip) {
              Remove-Item $finalZip -Force
            }
            Compress-Archive -Path "$contentDir\*" -DestinationPath $finalZip -Force
            Write-Host "Created final package: $finalZip"
            
            # 验证最终包
            $finalZipInfo = Get-Item $finalZip
            Write-Host "Final package size: $($finalZipInfo.Length) bytes"
          } else {
            Write-Error "No zip file found in dist directory!"
            exit 1
          }
          
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-Windows
          path: ${{ github.event.inputs.appName }}-Windows.zip

  build-macos:
    name: Build macOS Client
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Update OEM Config
        run: |
          dart run scripts/update_oem.dart \
            --appName="${{ github.event.inputs.appName }}" \
            --binaryName="${{ github.event.inputs.binaryName }}" \
            --packageName="${{ github.event.inputs.packageName }}" \
            --ossUrl="${{ github.event.inputs.ossUrl }}" \
            --imgbbApiKey="${{ github.event.inputs.imgbbApiKey }}" \
            --backupUrls="${{ github.event.inputs.backupUrls }}" \
            --fallbackUrl="${{ github.event.inputs.fallbackUrl }}" \
            --iconPath="${{ github.event.inputs.iconUrl != '' && github.event.inputs.iconUrl || 'assets/images/icon.png' }}"
            
      - name: Build Core
        run: dart setup.dart macos --out core --arch arm64

      - name: Build macOS
        run: flutter build macos --release --dart-define=APP_ENV=stable
        
      - name: Create DMG
        run: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls -d *.app | head -n 1)
          hdiutil create -volname "${{ github.event.inputs.appName }}" -srcfolder "$APP_NAME" -ov -format UDZO "${{ github.event.inputs.appName }}.dmg"
          mv "${{ github.event.inputs.appName }}.dmg" ../../../../../
          
      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-macOS
          path: ${{ github.event.inputs.appName }}.dmg

  build-linux:
    name: Build Linux Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libayatana-appindicator3-dev liblzma-dev libkeybinder-3.0-dev
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Update OEM Config
        run: |
          dart run scripts/update_oem.dart \
            --appName="${{ github.event.inputs.appName }}" \
            --binaryName="${{ github.event.inputs.binaryName }}" \
            --packageName="${{ github.event.inputs.packageName }}" \
            --ossUrl="${{ github.event.inputs.ossUrl }}" \
            --imgbbApiKey="${{ github.event.inputs.imgbbApiKey }}" \
            --backupUrls="${{ github.event.inputs.backupUrls }}" \
            --fallbackUrl="${{ github.event.inputs.fallbackUrl }}" \
            --iconPath="${{ github.event.inputs.iconUrl != '' && github.event.inputs.iconUrl || 'assets/images/icon.png' }}"

      - name: Clean Build Cache
        run: |
          flutter clean
          flutter pub get
            
      - name: Build Core
        run: dart setup.dart linux --out core --arch amd64

      - name: Build Linux
        run: flutter build linux --release --dart-define=APP_ENV=stable
        
      - name: Rename Executable
        run: |
          RELEASE_DIR="build/linux/x64/release/bundle"
          ORIGINAL_EXE="TianQue"
          BINARY_NAME="${{ github.event.inputs.binaryName }}"
          
          if [ -n "$BINARY_NAME" ] && [ "$BINARY_NAME" != "" ]; then
            echo "Renaming $ORIGINAL_EXE to $BINARY_NAME"
            mv "$RELEASE_DIR/$ORIGINAL_EXE" "$RELEASE_DIR/$BINARY_NAME"
            echo "✓ Renamed successfully"
          else
            echo "No custom binary name specified, keeping original name"
          fi
          
          echo "=== Final executable ==="
          ls -la "$RELEASE_DIR"
        
      - name: Archive Linux Build
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../${{ github.event.inputs.appName }}-Linux.tar.gz *
          
      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-Linux
          path: ${{ github.event.inputs.appName }}-Linux.tar.gz

  # 合并所有平台的构建产物到一个下载包
  merge-artifacts:
    name: Merge All Artifacts
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-macos, build-linux]
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts
          pattern: ${{ github.event.inputs.appName }}-*
          merge-multiple: false
          
      - name: List Downloaded Files
        run: |
          echo "=== Downloaded artifact directories ==="
          ls -la ./all-artifacts/
          echo ""
          echo "=== All files ==="
          find ./all-artifacts -type f -exec ls -lh {} \;
          
      - name: Merge into Single Package
        run: |
          mkdir -p ./release
          
          # 复制所有构建文件到 release 目录
          for dir in ./all-artifacts/*/; do
            echo "Processing: $dir"
            # 复制目录中的所有文件
            find "$dir" -type f \( -name "*.apk" -o -name "*.zip" -o -name "*.dmg" -o -name "*.tar.gz" \) -exec cp {} ./release/ \;
          done
          
          echo ""
          echo "=== Final release package contents ==="
          ls -lh ./release/
          
      - name: Upload Merged Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-All-Platforms
          path: ./release/
          retention-days: 30
          if-no-files-found: warn
