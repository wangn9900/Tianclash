name: Build OEM Client

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'App Name (应用名称)'
        required: true
        default: '展示'
      binaryName:
        description: 'Binary Name (可执行文件名, 英文/拼音)'
        required: true
        default: 'ZhanShi'
      packageName:
        description: 'Package Name (包名)'
        required: true
        default: 'com.follow.clash'
      ossUrl:
        description: 'OSS URL (配置接口)'
        required: true
        default: 'https://oss.tianque.cc/osss_config.txt'
      imgbbApiKey:
        description: 'ImgBB API Key (图床Key)'
        required: true
        default: '85719aefcab7c40a7eaed3b06784898a'
      backupUrls:
        description: 'Backup URLs (备用地址, 逗号分隔)'
        required: false
        default: 'https://210.16.123.247,https://210.16.123.247,https://210.16.123.247'
      fallbackUrl:
        description: 'Fallback URL (回退地址)'
        required: false
        default: 'https://150.241.207.176:8443'
      iconUrl:
        description: 'Icon URL (图标链接, 可选)'
        required: false
        default: 'https://oss.tianque.cc/i8.png'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Update OEM Config
        run: |
          dart run scripts/update_oem.dart \
            --appName="${{ github.event.inputs.appName }}" \
            --binaryName="${{ github.event.inputs.binaryName }}" \
            --packageName="${{ github.event.inputs.packageName }}" \
            --ossUrl="${{ github.event.inputs.ossUrl }}" \
            --imgbbApiKey="${{ github.event.inputs.imgbbApiKey }}" \
            --backupUrls="${{ github.event.inputs.backupUrls }}" \
            --fallbackUrl="${{ github.event.inputs.fallbackUrl }}" \
            --iconPath="${{ github.event.inputs.iconUrl != '' && github.event.inputs.iconUrl || 'assets/images/icon.png' }}"
            
      - name: Build Core
        run: dart setup.dart android --out core

      - name: Setup Android Signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          elif [ -n "${{ secrets.KEYSTORE }}" ]; then
            echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          else
            echo "⚠️ No keystore secret found!"
          fi
          
          if [ -n "${{ secrets.KEY_ALIAS }}" ]; then
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          fi
          if [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ]; then
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/local.properties
          elif [ -n "${{ secrets.STORE_PASSWORD }}" ]; then
            echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          fi
          if [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties
          fi

      - name: Build APK
        run: flutter build apk --release --split-per-abi --dart-define=APP_ENV=stable
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-Android
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk

  build-windows:
    name: Build Windows Client
    runs-on: Windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Update OEM Config
        run: |
          dart run scripts/update_oem.dart `
            --appName="${{ github.event.inputs.appName }}" `
            --binaryName="${{ github.event.inputs.binaryName }}" `
            --packageName="${{ github.event.inputs.packageName }}" `
            --ossUrl="${{ github.event.inputs.ossUrl }}" `
            --imgbbApiKey="${{ github.event.inputs.imgbbApiKey }}" `
            --backupUrls="${{ github.event.inputs.backupUrls }}" `
            --fallbackUrl="${{ github.event.inputs.fallbackUrl }}" `
            --iconPath="${{ github.event.inputs.iconUrl != '' && github.event.inputs.iconUrl || 'assets/images/icon.png' }}"
            
      - name: Build Core and Helper
        id: build_core
        run: |
          # 运行 setup.dart 构建核心和 helper（helper 会自动嵌入正确的 token）
          dart setup.dart windows --out prep --arch amd64
          
          # 查找并计算核心文件的 SHA256
          # setup.dart 将核心文件输出到 libclash/windows/ 目录
          $corePath = Get-ChildItem -Path "libclash\windows" -Filter "FlClashCore.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $corePath) {
            Write-Error "FlClashCore.exe not found!"
            exit 1
          }
          Write-Host "Found core at: $corePath"
          
          $hash = (Get-FileHash -Path $corePath -Algorithm SHA256).Hash.ToLower()
          echo "CORE_SHA256=$hash" >> $env:GITHUB_OUTPUT
          echo "CORE_PATH=$corePath" >> $env:GITHUB_OUTPUT
          Write-Host "Core SHA256: $hash"
          
          # 列出所有构建的文件
          Write-Host "=== Built files ==="
          Get-ChildItem -Path "libclash\windows" -Recurse | Format-Table FullName, Length
          
      - name: Build Windows App
        run: flutter build windows --release --dart-define=APP_ENV=stable --dart-define=CORE_SHA256=${{ steps.build_core.outputs.CORE_SHA256 }}
        
      - name: Copy Core Files to Build Output
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          
          # 复制核心文件
          $coreFiles = Get-ChildItem -Path "libclash\windows" -Filter "*.exe" -Recurse
          foreach ($file in $coreFiles) {
            Write-Host "Copying $($file.Name) to $releaseDir"
            Copy-Item -Path $file.FullName -Destination $releaseDir -Force
          }
          
          Write-Host "=== Final build contents ==="
          Get-ChildItem $releaseDir | Format-Table Name, Length
          
      - name: Verify Core Files
        run: |
          $releaseDir = "build\windows\x64\runner\Release"
          $requiredFiles = @("FlClashCore.exe", "FlClashHelperService.exe")
          foreach ($file in $requiredFiles) {
            if (-not (Test-Path "$releaseDir\$file")) {
              Write-Error "Missing required file: $file"
              exit 1
            }
            Write-Host "✓ Found: $file"
          }
        
      - name: Archive Windows Build
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath ${{ github.event.inputs.appName }}-Windows.zip
          
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-Windows
          path: ${{ github.event.inputs.appName }}-Windows.zip

  build-macos:
    name: Build macOS Client
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Update OEM Config
        run: |
          dart run scripts/update_oem.dart \
            --appName="${{ github.event.inputs.appName }}" \
            --binaryName="${{ github.event.inputs.binaryName }}" \
            --packageName="${{ github.event.inputs.packageName }}" \
            --ossUrl="${{ github.event.inputs.ossUrl }}" \
            --imgbbApiKey="${{ github.event.inputs.imgbbApiKey }}" \
            --backupUrls="${{ github.event.inputs.backupUrls }}" \
            --fallbackUrl="${{ github.event.inputs.fallbackUrl }}" \
            --iconPath="${{ github.event.inputs.iconUrl != '' && github.event.inputs.iconUrl || 'assets/images/icon.png' }}"
            
      - name: Build Core
        run: dart setup.dart macos --out core --arch arm64

      - name: Build macOS
        run: flutter build macos --release --dart-define=APP_ENV=stable
        
      - name: Create DMG
        run: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls -d *.app | head -n 1)
          hdiutil create -volname "${{ github.event.inputs.appName }}" -srcfolder "$APP_NAME" -ov -format UDZO "${{ github.event.inputs.appName }}.dmg"
          mv "${{ github.event.inputs.appName }}.dmg" ../../../../../
          
      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-macOS
          path: ${{ github.event.inputs.appName }}.dmg

  build-linux:
    name: Build Linux Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libayatana-appindicator3-dev liblzma-dev libkeybinder-3.0-dev
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Update OEM Config
        run: |
          dart run scripts/update_oem.dart \
            --appName="${{ github.event.inputs.appName }}" \
            --binaryName="${{ github.event.inputs.binaryName }}" \
            --packageName="${{ github.event.inputs.packageName }}" \
            --ossUrl="${{ github.event.inputs.ossUrl }}" \
            --imgbbApiKey="${{ github.event.inputs.imgbbApiKey }}" \
            --backupUrls="${{ github.event.inputs.backupUrls }}" \
            --fallbackUrl="${{ github.event.inputs.fallbackUrl }}" \
            --iconPath="${{ github.event.inputs.iconUrl != '' && github.event.inputs.iconUrl || 'assets/images/icon.png' }}"
            
      - name: Build Core
        run: dart setup.dart linux --out core --arch amd64

      - name: Build Linux
        run: flutter build linux --release --dart-define=APP_ENV=stable
        
      - name: Archive Linux Build
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../${{ github.event.inputs.appName }}-Linux.tar.gz *
          
      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-Linux
          path: ${{ github.event.inputs.appName }}-Linux.tar.gz

  # 合并所有平台的构建产物到一个下载包
  merge-artifacts:
    name: Merge All Artifacts
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-macos, build-linux]
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts
          pattern: ${{ github.event.inputs.appName }}-*
          merge-multiple: false
          
      - name: List Downloaded Files
        run: |
          echo "=== Downloaded artifact directories ==="
          ls -la ./all-artifacts/
          echo ""
          echo "=== All files ==="
          find ./all-artifacts -type f -exec ls -lh {} \;
          
      - name: Merge into Single Package
        run: |
          mkdir -p ./release
          
          # 复制所有构建文件到 release 目录
          for dir in ./all-artifacts/*/; do
            echo "Processing: $dir"
            # 复制目录中的所有文件
            find "$dir" -type f \( -name "*.apk" -o -name "*.zip" -o -name "*.dmg" -o -name "*.tar.gz" \) -exec cp {} ./release/ \;
          done
          
          echo ""
          echo "=== Final release package contents ==="
          ls -lh ./release/
          
      - name: Upload Merged Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.appName }}-All-Platforms
          path: ./release/
          retention-days: 30
          if-no-files-found: warn
