name: Build OEM Client

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'App Name (еә”з”ЁеҗҚз§°)'
        required: true
        default: 'еұ•зӨә'
      binaryName:
        description: 'Binary Name (еҸҜжү§иЎҢж–Үд»¶еҗҚ, иӢұж–Ү/жӢјйҹі)'
        required: true
        default: 'ZhanShi'
      packageName:
        description: 'Package Name (еҢ…еҗҚ)'
        required: true
        default: 'com.follow.clash'
      ossUrl:
        description: 'OSS URL (й…ҚзҪ®жҺҘеҸЈ)'
        required: true
        default: 'https://oss.tianque.cc/osss_config.txt'
      imgbbApiKey:
        description: 'ImgBB API Key (еӣҫеәҠKey)'
        required: true
        default: '85719aefcab7c40a7eaed3b06784898a'
      backupUrls:
        description: 'Backup URLs (еӨҮз”Ёең°еқҖ, йҖ—еҸ·еҲҶйҡ”)'
        required: false
        default: 'https://210.16.123.247,https://210.16.123.247,https://210.16.123.247'
      fallbackUrl:
        description: 'Fallback URL (еӣһйҖҖең°еқҖ)'
        required: false
        default: 'https://150.241.207.176:8443'
      iconUrl:
        description: 'Icon URL (еӣҫж Үй“ҫжҺҘ, еҸҜйҖ?'
        required: false
        default: 'https://oss.tianque.cc/i8.png'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Update OEM Config
        run: |
          dart run scripts/update_oem.dart \
            --appName="${{ github.event.inputs.appName }}" \
            --binaryName="${{ github.event.inputs.binaryName }}" \
            --packageName="${{ github.event.inputs.packageName }}" \
            --ossUrl="${{ github.event.inputs.ossUrl }}" \
            --imgbbApiKey="${{ github.event.inputs.imgbbApiKey }}" \
            --backupUrls="${{ github.event.inputs.backupUrls }}" \
            --fallbackUrl="${{ github.event.inputs.fallbackUrl }}" \
            --iconPath="${{ github.event.inputs.iconUrl != '' && github.event.inputs.iconUrl || 'assets/images/icon.png' }}"
            
      - name: Build Core
        run: dart setup.dart android --out core

      - name: Setup Android Signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          elif [ -n "${{ secrets.KEYSTORE }}" ]; then
            echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
          else
            echo "вҡ пёҸ No keystore secret found!"
          fi
          
          if [ -n "${{ secrets.KEY_ALIAS }}" ]; then
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          fi
          if [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ]; then
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/local.properties
          elif [ -n "${{ secrets.STORE_PASSWORD }}" ]; then
            echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
          fi
          if [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties
          fi

      - name: Build APK
        run: flutter build apk --release --split-per-abi --dart-define=APP_ENV=stable
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.binaryName }}-Android
          path: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk

  build-windows:
    name: Build Windows Client
    runs-on: Windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Update OEM Config
        run: |
          dart run scripts/update_oem.dart `
            --appName="${{ github.event.inputs.appName }}" `
            --binaryName="${{ github.event.inputs.binaryName }}" `
            --packageName="${{ github.event.inputs.packageName }}" `
            --ossUrl="${{ github.event.inputs.ossUrl }}" `
            --imgbbApiKey="${{ github.event.inputs.imgbbApiKey }}" `
            --backupUrls="${{ github.event.inputs.backupUrls }}" `
            --fallbackUrl="${{ github.event.inputs.fallbackUrl }}" `
            --iconPath="${{ github.event.inputs.iconUrl != '' && github.event.inputs.iconUrl || 'assets/images/icon.png' }}"
            
      - name: Prepare Build Environment
        run: |
          # жіЁж„ҸпјҡдёҚжү§иЎҢ flutter cleanпјҢеӣ дёәиҝҷеҸҜиғҪеҜјиҮҙжһ„е»әй—®йўҳ
          # еҸӘзЎ®дҝқдҫқиө–жҳҜжңҖж–°зҡ„
          flutter pub get
          
          # йӘҢиҜҒ OEM й…ҚзҪ®жӣҙж–°жҲҗеҠҹ
          Write-Host "=== Verifying OEM Config Changes ==="
          if (Test-Path "windows/runner/Runner.rc") {
            Get-Content "windows/runner/Runner.rc" | Select-String -Pattern "FileDescription|ProductName" | ForEach-Object { Write-Host $_ }
          }

            
      - name: Build Windows
        run: |
          # дҪҝз”ЁдёҺдё»жһ„е»әзӣёеҗҢзҡ„ж–№ејҸзј–иҜ‘ж ёеҝғе’Ңеә”з”Ё
          dart setup.dart windows --arch amd64 --env stable
          
      - name: Prepare Final Package
        run: |
          Write-Host "=== Preparing Windows Package ==="
          
          # Flutter жһ„е»әиҫ“еҮәзӣ®еҪ•
          $releaseDir = "build\windows\x64\runner\Release"
          
          # жЈҖжҹҘжһ„е»әжҳҜеҗҰжҲҗеҠ?
          if (-not (Test-Path $releaseDir)) {
            Write-Error "Release directory not found: $releaseDir"
            exit 1
          }
          
          Write-Host "=== Release directory contents ==="
          Get-ChildItem $releaseDir -Recurse | ForEach-Object {
            Write-Host "$($_.FullName) - $($_.Length) bytes"
          }
          
          # йӘҢиҜҒе…ій”®ж–Үд»¶еӯҳеңЁ
          $requiredFiles = @("TianQue.exe", "flutter_windows.dll", "FlClashCore.exe")
          foreach ($file in $requiredFiles) {
            $filePath = Join-Path $releaseDir $file
            if (-not (Test-Path $filePath)) {
              Write-Error "Required file not found: $file"
              exit 1
            }
            $fileInfo = Get-Item $filePath
            Write-Host "Verified: $file = $($fileInfo.Length) bytes"
          }
          
          # йҮҚе‘ҪеҗҚеҸҜжү§иЎҢж–Үд»¶пјҲеҰӮжһңйңҖиҰҒпјү
          $binaryName = "${{ github.event.inputs.binaryName }}"
          if ($binaryName -and $binaryName -ne "" -and $binaryName -ne "TianQue") {
            $oldExe = Join-Path $releaseDir "TianQue.exe"
            $newExe = Join-Path $releaseDir "$binaryName.exe"
            
            Write-Host "Renaming TianQue.exe to $binaryName.exe"
            Copy-Item -Path $oldExe -Destination $newExe -Force
            Remove-Item -Path $oldExe -Force
            
            # йӘҢиҜҒ
            $newFile = Get-Item $newExe
            Write-Host "New exe: $($newFile.Name) = $($newFile.Length) bytes"
          }
          
          # зӣҙжҺҘжү“еҢ… Release зӣ®еҪ•пјҲдёҚи§ЈеҺӢйҮҚжү“еҢ…пјү
          $finalZip = "${{ github.event.inputs.binaryName }}-Windows.zip"
          
          Write-Host "Creating package: $finalZip"
          
          # дҪҝз”Ё Compress-Archive зӣҙжҺҘжү“еҢ…
          Compress-Archive -Path "$releaseDir\*" -DestinationPath $finalZip -Force
          
          # йӘҢиҜҒжңҖз»ҲеҢ…
          $finalZipInfo = Get-Item $finalZip
          Write-Host "Final package: $finalZip"
          Write-Host "Final package size: $($finalZipInfo.Length) bytes"
          
          # еҢ…еӨ§е°Ҹеә”иҜҘиҮіе°?50MBпјҲflutter_windows.dll + FlClashCore.exe зӯүпјү
          if ($finalZipInfo.Length -lt 50000000) {
            Write-Warning "Package seems too small! Expected > 50MB"
          }
          
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.binaryName }}-Windows
          path: ${{ github.event.inputs.binaryName }}-Windows.zip

  build-macos:
    name: Build macOS Client
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Update OEM Config
        run: |
          dart run scripts/update_oem.dart \
            --appName="${{ github.event.inputs.appName }}" \
            --binaryName="${{ github.event.inputs.binaryName }}" \
            --packageName="${{ github.event.inputs.packageName }}" \
            --ossUrl="${{ github.event.inputs.ossUrl }}" \
            --imgbbApiKey="${{ github.event.inputs.imgbbApiKey }}" \
            --backupUrls="${{ github.event.inputs.backupUrls }}" \
            --fallbackUrl="${{ github.event.inputs.fallbackUrl }}" \
            --iconPath="${{ github.event.inputs.iconUrl != '' && github.event.inputs.iconUrl || 'assets/images/icon.png' }}"
            
      - name: Build Core
        run: dart setup.dart macos --out core --arch arm64

      - name: Build macOS
        run: flutter build macos --release --dart-define=APP_ENV=stable
        
      - name: Create DMG
        run: |
          cd build/macos/Build/Products/Release
          APP_NAME=$(ls -d *.app | head -n 1)
          hdiutil create -volname "${{ github.event.inputs.appName }}" -srcfolder "$APP_NAME" -ov -format UDZO "${{ github.event.inputs.binaryName }}.dmg"
          mv "${{ github.event.inputs.binaryName }}.dmg" ../../../../../
          
      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.binaryName }}-macOS
          path: ${{ github.event.inputs.binaryName }}.dmg

  build-linux:
    name: Build Linux Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev libayatana-appindicator3-dev liblzma-dev libkeybinder-3.0-dev
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Update OEM Config
        run: |
          dart run scripts/update_oem.dart \
            --appName="${{ github.event.inputs.appName }}" \
            --binaryName="${{ github.event.inputs.binaryName }}" \
            --packageName="${{ github.event.inputs.packageName }}" \
            --ossUrl="${{ github.event.inputs.ossUrl }}" \
            --imgbbApiKey="${{ github.event.inputs.imgbbApiKey }}" \
            --backupUrls="${{ github.event.inputs.backupUrls }}" \
            --fallbackUrl="${{ github.event.inputs.fallbackUrl }}" \
            --iconPath="${{ github.event.inputs.iconUrl != '' && github.event.inputs.iconUrl || 'assets/images/icon.png' }}"

      - name: Clean Build Cache
        run: |
          flutter clean
          flutter pub get
            
      - name: Build Core
        run: dart setup.dart linux --out core --arch amd64

      - name: Build Linux
        run: flutter build linux --release --dart-define=APP_ENV=stable
        
      - name: Rename Executable
        run: |
          RELEASE_DIR="build/linux/x64/release/bundle"
          ORIGINAL_EXE="TianQue"
          BINARY_NAME="${{ github.event.inputs.binaryName }}"
          
          if [ -n "$BINARY_NAME" ] && [ "$BINARY_NAME" != "" ]; then
            echo "Renaming $ORIGINAL_EXE to $BINARY_NAME"
            mv "$RELEASE_DIR/$ORIGINAL_EXE" "$RELEASE_DIR/$BINARY_NAME"
            echo "вң?Renamed successfully"
          else
            echo "No custom binary name specified, keeping original name"
          fi
          
          echo "=== Final executable ==="
          ls -la "$RELEASE_DIR"
        
      - name: Archive Linux Build
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../${{ github.event.inputs.binaryName }}-Linux.tar.gz *
          
      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.binaryName }}-Linux
          path: ${{ github.event.inputs.binaryName }}-Linux.tar.gz

  # еҗҲе№¶жүҖжңүе№іеҸ°зҡ„жһ„е»әдә§зү©еҲ°дёҖдёӘдёӢиҪҪеҢ…
  merge-artifacts:
    name: Merge All Artifacts
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-macos, build-linux]
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts
          pattern: ${{ github.event.inputs.binaryName }}-*
          merge-multiple: false
          
      - name: List Downloaded Files
        run: |
          echo "=== Downloaded artifact directories ==="
          ls -la ./all-artifacts/
          echo ""
          echo "=== All files ==="
          find ./all-artifacts -type f -exec ls -lh {} \;
          
      - name: Merge into Single Package
        run: |
          mkdir -p ./release
          
          # еӨҚеҲ¶жүҖжңүжһ„е»әж–Үд»¶еҲ° release зӣ®еҪ•
          for dir in ./all-artifacts/*/; do
            echo "Processing: $dir"
            # еӨҚеҲ¶зӣ®еҪ•дёӯзҡ„жүҖжңүж–Үд»?
            find "$dir" -type f \( -name "*.apk" -o -name "*.zip" -o -name "*.dmg" -o -name "*.tar.gz" \) -exec cp {} ./release/ \;
          done
          
          echo ""
          echo "=== Final release package contents ==="
          ls -lh ./release/
          
      - name: Upload Merged Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.binaryName }}-All-Platforms
          path: ./release/
          retention-days: 30
          if-no-files-found: warn
