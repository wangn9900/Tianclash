<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TianClash - 跨平台代理客户端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 via-purple-900 to-black min-h-screen text-white flex flex-col">

    <!-- Navbar -->
    <nav class="p-6">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
                TianClash
            </div>
            <!-- Links could go here -->
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="flex-grow flex items-center justify-center px-4">
        <div class="text-center max-w-4xl">
            <h1 class="text-5xl md:text-7xl font-bold mb-6 tracking-tight">
                连接世界，<br/>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">自由无界</span>
            </h1>
            <p class="text-gray-300 text-xl mb-12 max-w-2xl mx-auto">
                基于 ClashMeta 的下一代跨平台代理客户端。简洁、高效、极速。
            </p>

            <!-- Download Buttons Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 max-w-4xl mx-auto">
                <!-- Android -->
                <a href="./android-release.apk" class="glass rounded-xl p-6 hover:bg-white/10 transition duration-300 flex flex-col items-center group">
                    <svg class="w-10 h-10 mb-3 text-green-400 group-hover:scale-110 transition" fill="currentColor" viewBox="0 0 24 24"><path d="M17.523 15.3414c-.5511 0-.9993-.4486-.9993-.9997s.4482-.9993.9993-.9993c.5511 0 .9993.4482.9993.9993.0001.5511-.4482.9997-.9993.9997m-11.046 0c-.5511 0-.9993-.4486-.9993-.9997s.4482-.9993.9993-.9993c.5511 0 .9993.4482.9993.9993 0 .5511-.4482.9997-.9993.9997m11.4055-6.02l1.9973-3.459a.416.416 0 00-.1521-.5676.416.416 0 00-.5676.1521l-2.0223 3.503C15.5902 8.4213 13.8533 8.086 12 8.086c-1.8532 0-3.5901.3352-5.1375.9641l-2.0223-3.503a.416.416 0 00-.5676-.1521.416.416 0 00-.1521.5676l1.9973 3.459c-2.9157 1.5835-4.889 4.5495-5.086 7.915h19.9329c-.1969-3.3654-2.1702-6.3315-5.086-7.915"/></svg>
                    <span class="font-semibold">Android</span>
                    <span class="text-xs text-gray-400 mt-1">最新版本</span>
                </a>

                <!-- Windows -->
                <a href="./windows-setup.exe" class="glass rounded-xl p-6 hover:bg-white/10 transition duration-300 flex flex-col items-center group">
                    <svg class="w-10 h-10 mb-3 text-blue-400 group-hover:scale-110 transition" fill="currentColor" viewBox="0 0 24 24"><path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801"/></svg>
                    <span class="font-semibold">Windows</span>
                    <span class="text-xs text-gray-400 mt-1">x64 / Arm64</span>
                </a>

                <!-- macOS -->
                <a href="./macos-installer.dmg" class="glass rounded-xl p-6 hover:bg-white/10 transition duration-300 flex flex-col items-center group">
                    <svg class="w-10 h-10 mb-3 text-gray-200 group-hover:scale-110 transition" fill="currentColor" viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.21-1.98 1.07-3.11-1.04.05-2.29.69-3.02 1.55-.65.75-1.21 1.95-1.06 3.04 1.15.09 2.33-.64 3.01-1.48"/></svg>
                    <span class="font-semibold">macOS</span>
                    <span class="text-xs text-gray-400 mt-1">Intel / Apple Silicon</span>
                </a>

                <!-- Linux -->
                <a href="./linux-appimage.AppImage" class="glass rounded-xl p-6 hover:bg-white/10 transition duration-300 flex flex-col items-center group">
                    <svg class="w-10 h-10 mb-3 text-yellow-500 group-hover:scale-110 transition" fill="currentColor" viewBox="0 0 24 24"><path d="M12.314 0c-2.427 0-4.66.727-4.66 4.318 0 0-.968.484-.968 2.663 0 2.18.484 2.18.484 2.18s-.9-.484-1.453-.484c-.553 0-1.21.242-1.21 1.936 0 1.933 1.054 3.12 1.054 3.12s-1.006.326-1.006 1.9c0 1.21.6 2.057.6 2.057l.635 1.573s-.29.484-.29 1.453c0 .969.458 1.42.968 1.42.242 0 .484 0 .484.484 0 .484.484 1.127 2.42 1.356 0 0 .285.498.816.498.42 0 1.056-.15 2.09-.15 1.63 0 2.33.245 2.614.245.286 0 .866-.245.866-.726 0-.484.484-.968.484-1.452 0-1.162.727-1.452.727-1.452s.582-.387.582-1.55c0-.968-.242-1.452-.242-1.452l.605-1.573s.605-.847.605-2.057c0-1.573-1.005-1.9-1.005-1.9s1.053-1.186 1.053-3.118c0-1.694-.657-1.936-1.21-1.936-.554 0-1.452.484-1.452.484s.484 0 .484-2.18c0-2.18-.97-2.662-.97-2.662C16.972.727 14.74 0 12.314 0"/></svg>
                    <span class="font-semibold">Linux</span>
                    <span class="text-xs text-gray-400 mt-1">AppImage</span>
                </a>
            </div>
            
            <div class="mt-8 text-sm text-gray-500">
                <p>将应用安装包上传到服务器同级目录即可生效</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="p-6 text-center text-gray-500 text-sm">
        &copy; 2025 TianClash.
    </footer>

</body>
</html>
